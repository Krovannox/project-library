<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">

        <header class="header">
            <h1 class="header-title">LIBRARY</h1>
        </header>

        <main class="main">
            <button class="btn-add-book" id="btn-add-book">+ Add Book</button>

            <div class="books-container" id="books-container">
                
            </div>

            <dialog class="dialog-container" id="dialog-container" closedby="any">
                <form action="#" method="post" class="add-book-form">
                    <span class="add-book-form-description">Book Information</span>

                    <div class="add-book-form-inputs-container">
                        <label for="book-title" class="add-book-form-label">Title:</label>
                        <input type="text" class="add-book-form-input" name="book_title" id="book-title" placeholder="Title...">

                        <label for="book-author" class="add-book-form-label">Author:</label>
                        <input type="text" class="add-book-form-input" name="book_author" id="book-author" placeholder="Author...">

                        <label for="book-pages" class="add-book-form-label">Pages:</label>
                        <input type="number" class="add-book-form-input" name="" id="book-pages" placeholder="123...">
                    </div>

                    <button type="submit" class="btn-submit-add-book-form" id="btn-submit-add-book-form">Submit</button>

                    <button type="button" class="btn-close-add-book-form" id="btn-close-add-book-form">Close</button>
                </form>
            </dialog>

        </main>

    </div>
</body>
</html>
